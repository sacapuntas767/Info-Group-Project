<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Live Events Finder</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<nav class="navbar glass">
  <div class="navbar-inner">
    <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 10px;">
      <img src="assets/icons/icon-192.png" alt="Logo" class="nav-logo">
      <span>Live Events Finder</span>
    </a>

    <div class="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="events.html">Events</a>
      <a class="nav-link" href="festivals.html">Festivals</a>
      <a class="nav-link" href="my-events.html">My Events</a>
      <a class="nav-link" href="about.html">About</a>
    </div>

    <div class="nav-actions" id="auth-actions">
      <a class="btn btn-secondary" href="login.html">Login</a>
      <a class="btn btn-primary" href="signup.html">Sign Up</a>
    </div>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="glass form-card">
      <h1 class="section-title" style="margin-bottom: 8px;">Welcome Back</h1>
      <p class="section-copy">Log in to access your favorites and saved events.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="login-identifier">Username or Email</label>
          <input id="login-identifier" type="text" placeholder="bob or bob@mail.com" required>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="bobpass" required>
        </div>

        <button class="btn btn-primary" type="submit" style="width: 100%;">Log In</button>
      </form>

      <p style="margin-top: 18px; color: #94a3b8;">Demo login: <strong>bob</strong> / <strong>bobpass</strong></p>
      <p style="margin-top: 12px; color: #94a3b8;">Don’t have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container" style="text-align: center;">
    <p style="color: #94a3b8;">
      © 2026 Live Events Finder
    </p>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
